[package]
name        = "neely_core"
version     = "0.1.0"
edition     = "2021"
description = "Neely Wave Core(P0;對齊 m2Spec/oldm2Spec/neely_core.md r2)— skeleton 階段"

[lib]
path = "src/lib.rs"

[dependencies]
fact_schema    = { path = "../../../cores_shared/fact_schema" }
core_registry  = { path = "../../../cores_shared/core_registry" }
anyhow         = { workspace = true }
chrono         = { workspace = true }
serde          = { workspace = true }
serde_json     = { workspace = true }
inventory      = "0.3"
# v4.32 Golden L3:TypeScript 契約 codegen(feature-gated → 生產 build 預設不開,零風險)
ts-rs          = { version = "10", features = ["chrono-impl"], optional = true }

[features]
# `cargo test --features ts` 從 output.rs 型別樹生 TS interface(drift 被抓 = 治本)。
# 生產 `cargo build --release -p tw_cores` 走預設 feature(不含 ts)→ 不引入 ts-rs。
ts = ["dep:ts-rs"]
