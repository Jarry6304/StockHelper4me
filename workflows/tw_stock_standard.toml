enabled  = true
priority = "P3"

# ─────────────────────────────────────────────────────────
# 寫入策略(對齊 cores_overview §7.1)
# ─────────────────────────────────────────────────────────
[output]
write_indicator_values     = true
write_structural_snapshots = true
write_facts                = true

# ─────────────────────────────────────────────────────────
# Batch 排程(目前 tw_cores binary 不消費此 section,留 future use)
# ─────────────────────────────────────────────────────────
[schedule]
run_at   = "17:30"
catch_up = true
