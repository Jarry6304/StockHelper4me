enabled  = true
priority = "P2"

[[cores]]
name     = "institutional_core"
enabled  = true
priority = "P2"

[[cores]]
name     = "margin_core"
enabled  = true
priority = "P2"

[[cores]]
name     = "foreign_holding_core"
enabled  = true
priority = "P2"

[[cores]]
name     = "shareholder_core"
enabled  = true
