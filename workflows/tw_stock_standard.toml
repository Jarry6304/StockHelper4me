# tw_stock_standard.toml — 台股標準 Workflow(production-ready)
#
# 對齊 m3Spec/cores_overview.md §13.1(Workflow vs Orchestrator)。
#
# Workflow:從 user 視角宣告「跑哪些 Core,各 Core 用什麼參數」。
# Orchestrator(tw_cores binary)從 inventory CoreRegistry 動態 dispatch。
#
# **PR-9b 已落地**:tw_cores run-all --workflow <path> 解析本檔,過濾 dispatch 範圍。
# 未指定 --workflow 時走全 23 cores hardcoded fallback(對齊 PR-9a 行為)。
#
# 用法:
#   tw_cores run-all --workflow workflows/tw_stock_standard.toml --write
#
# 自訂子集:複製此檔改 enabled=false 即可,例 workflows/p1_only.toml 只跑 P1 indicator。

[workflow]
name        = "tw_stock_standard"
description = "台股完整 Workflow:P0 Wave(1)+ P1 Indicator(8)+ P3 Indicator(8)+ P2 Pattern(3)+ P2 Chip(5)+ P2 Fundamental(3)+ P2 Environment(6)= 34 cores"
version     = "2.0.0"

# stock 範圍(保留字 _index_taiex_ / _market_ / _global_ 由 environment cores 處理)
# 註:本欄目前供 future use;tw_cores run-all 仍從 --stocks / --dirty / 全市場拉清單
[targets]
stock_ids = []   # 空 = 全市場(從 price_daily_fwd 拉 distinct)
timeframe = "daily"

# ─────────────────────────────────────────────────────────
# P0 Wave Core(1 個)
# ─────────────────────────────────────────────────────────
[[cores]]
name     = "neely_core"
enabled  = true
priority = "P0"

  [cores.params]
  timeframe = "daily"

  [cores.params.engine_config]
  atr_period               = 14
  beam_width               = 50
  forest_max_size          = 200      # v1.34 P0 Gate v2 校準
  compaction_timeout_secs  = 60
  neutral_threshold_taiex  = 0.5

  [cores.params.engine_config.overflow_strategy]
  kind = "BeamSearchFallback"
  k    = 100

# ─────────────────────────────────────────────────────────
# P1 Indicator Cores(8 個)
# ─────────────────────────────────────────────────────────
[[cores]]
name     = "macd_core"
enabled  = true
priority = "P1"

[[cores]]
name     = "rsi_core"
enabled  = true
priority = "P1"

[[cores]]
name     = "kd_core"
enabled  = true
priority = "P1"

[[cores]]
name     = "adx_core"
enabled  = true
priority = "P1"

[[cores]]
name     = "ma_core"
enabled  = true
priority = "P1"

[[cores]]
name     = "bollinger_core"
enabled  = true
priority = "P1"

[[cores]]
name     = "atr_core"
enabled  = true
priority = "P1"

[[cores]]
name     = "obv_core"
enabled  = true
priority = "P1"

# ─────────────────────────────────────────────────────────
# P3 Indicator Cores(8 個 — 動量 / 波動 / 量能補完)
# ─────────────────────────────────────────────────────────
[[cores]]
name     = "williams_r_core"
enabled  = true
priority = "P3"

[[cores]]
name     = "cci_core"
enabled  = true
priority = "P3"

[[cores]]
name     = "keltner_core"
enabled  = true
priority = "P3"

[[cores]]
name     = "donchian_core"
enabled  = true
priority = "P3"

[[cores]]
name     = "vwap_core"
enabled  = true
priority = "P3"

[[cores]]
name     = "mfi_core"
enabled  = true
priority = "P3"

[[cores]]
name     = "coppock_core"
enabled  = true
priority = "P3"  # 建議走 monthly timeframe(Coppock 原意),tw_cores 預設 daily 為主

[[cores]]
name     = "ichimoku_core"
enabled  = true
priority = "P3"

# ─────────────────────────────────────────────────────────
# P2 Pattern Cores(3 個,結構性指標 — 寫入 structural_snapshots)
# 對齊 m3Spec/indicator_cores_pattern.md(全 P2)。
# trendline_core 是唯一允許消費 neely_core 的 documented_exception(§5.2 / §5.7)。
# ─────────────────────────────────────────────────────────
[[cores]]
name     = "support_resistance_core"
enabled  = true
priority = "P2"

[[cores]]
name     = "candlestick_pattern_core"
enabled  = true
priority = "P2"

[[cores]]
name     = "trendline_core"
enabled  = true
priority = "P2"

# ─────────────────────────────────────────────────────────
# P2 Chip Cores(5 個)
# ─────────────────────────────────────────────────────────
