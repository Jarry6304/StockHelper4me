# =============================================================================
# tw-stock-collector / config / collector.toml — SUGGESTED v1.4
#
# 用途：依 FinMind 官方 Python SDK 原始碼（FinMind/data/data_loader.py +
#       finmind_api.py）逐支 dataset 對齊，並對應 src/db.py 的 DB schema。
#
# 與 v1.3 主要差異：
#   1. 移除 id_field 設定（v4 HTTP API 統一用 data_id；v1.3 引入此欄是錯誤的）
#   2. 補回 v1.3 移除的 3 支 dataset：
#        - TaiwanStockSplitPrice         → all_market_no_id
#        - TaiwanStockParValueChange     → all_market_no_id
#        - TaiwanStockPriceLimit         → per_stock
#   3. 補回所有 field_rename / detail_fields / aggregation
#      （v1.3 多支 API 直接拿掉這些欄位，DB upsert PRAGMA 過濾後資料會靜默掉）
#   4. token 維持空字串，請改用環境變數 FINMIND_TOKEN
#
# 已知細節：
#   - day_trading 表的 day_trading_buy/sell 語意為「買進/賣出金額」（API 的
#     BuyAmount/SellAmount），而非「買進筆數/賣出筆數」。SDK 文件確認：
#       BuyAfterSale (str) = 可否當沖旗標（不是買進筆數）
#       Volume (int)        = 成交量（不是賣出筆數）
#     v1.2 的映射 BuyAfterSale→day_trading_buy 語意錯，本檔改為映射金額。
#   - 財報三表（TaiwanStockFinancialStatements / BalanceSheet / CashFlowsStatement）
#     的 date 欄位是「會計期間結束日」而非「公告日」。因此 incremental 模式
#     會以較長 lookback 重新查詢（在 phase_executor 中處理），確保抓到新公告的
#     上一季財報。
# =============================================================================

[global]
db_path             = "data/tw_stock.db"
log_dir             = "logs"
log_level           = "INFO"
token               = ""                                  # 必填，建議改用環境變數 FINMIND_TOKEN
backfill_start_date = "2019-01-01"
rust_binary_path    = "rust_compute/target/release/tw_stock_compute"

[global.rate_limit]
calls_per_hour      = 1600
burst_size          = 5
cooldown_on_429_sec = 120
min_interval_ms     = 2250

[global.retry]
max_attempts     = 3
backoff_base_sec = 5
backoff_max_sec  = 60
retry_on_status  = [429, 500, 502, 503, 504]

[execution]
mode = "backfill"

[execution.backfill]
start_date = "2019-01-01"
phases     = [0, 1, 2, 3, 4, 5, 6]
resume     = true

[execution.incremental]
phases = [0, 1, 2, 3, 4, 5, 6]

# =============================================================================
# API Registry
#
# param_mode 一覽：
#   "all_market"        → dataset (+ start_date/end_date)，無 id 參數
#   "all_market_no_id"  → dataset + start_date + end_date，無 data_id（語意同上）
#   "per_stock"         → dataset + data_id + start_date + end_date
#   "per_stock_no_end"  → dataset + data_id + start_date（無 end_date）
#   "per_stock_fixed"   → 同 per_stock 但 data_id 來自 fixed_ids，不走 stock_list
#
# ⚠️ 重要：v4 HTTP API 一律使用 data_id 作為股票識別參數。
#         FinMind Python SDK 的 stock_id 函式參數會被內部映射到 data_id。
#         本 toml 不再使用 id_field 欄位。
# =============================================================================

# =============================================================================
# Phase 1：META（全市場基礎資料）
# =============================================================================

[[api]]
name         = "stock_info"
dataset      = "TaiwanStockInfo"
param_mode   = "all_market"
target_table = "stock_info_ref"
phase        = 1
enabled      = true
is_backer    = false
segment_days = 0
field_rename = {"date" = "_data_update_date"}
notes        = "上市上櫃股票基本資料；v3.2 R-2 後 DB column type/industry_category 跟 API field 同名,不需 rename；API 的 date 是『資料更新日』pack 進 detail.data_update_date；updated_at 由 schema DEFAULT NOW() 填"

[[api]]
name           = "stock_delisting"
dataset        = "TaiwanStockDelisting"
param_mode     = "all_market"
target_table   = "stock_info_ref"
phase          = 1
enabled        = true
is_backer      = false
segment_days   = 0
backfill_start_override = "2022-01-01"
merge_strategy = "update_delist_date"
notes          = "下市櫃清單，合併寫入 stock_info_ref.delisting_date(v3.2 R-2 後欄位名)"

[[api]]
name         = "trading_calendar"
dataset      = "TaiwanStockTradingDate"
param_mode   = "all_market"
target_table = "trading_date_ref"
phase        = 0
enabled      = true
is_backer    = true
segment_days = 0
notes        = "交易日曆(v3.2 R-1 後表名 trading_date_ref);API 只回 date 欄位。獨立為 Phase 0 因為 Phase 5 institutional aggregator 依賴本表過濾 FinMind 週六鬼資料"

[[api]]
name         = "market_index_tw"
dataset      = "TaiwanStockTotalReturnIndex"
param_mode   = "per_stock_fixed"
target_table = "market_index_tw"
phase        = 1
enabled      = true
is_backer    = false
segment_days = 365
fixed_ids    = ["TAIEX", "TPEx"]
notes        = "加權報酬指數（TAIEX）+ 櫃買報酬指數（TPEx）"
# API 回傳 (date, stock_id, price)；DB schema PK 已更新為 (market, stock_id, date)

