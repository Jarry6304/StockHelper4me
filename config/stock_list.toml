# =============================================================================
# 股票清單設定
# 說明：此檔案獨立於 collector.toml，可隨時手動編輯
#       source.mode 決定股票清單來源策略
# =============================================================================

[source]
# 清單來源策略：
#   "db"    → 從 stock_info 表動態讀取（Phase 1 完成後可用）
#   "file"  → 使用下方 [stocks] 靜態清單
#   "both"  → DB 為主，[stocks] 為補充（取聯集）
mode = "db"

# -----------------------------------------------------------------------------
# 篩選條件（僅 mode = "db" 時生效）
# -----------------------------------------------------------------------------
[filter]
market_type      = ["twse", "otc"]   # twse=上市, otc=上櫃, emerging=興櫃
exclude_etf      = false             # 是否排除 ETF
exclude_warrant  = true              # 排除權證
exclude_tdr      = true              # 排除 TDR（台灣存託憑證）
exclude_delisted = true              # 排除已下市/下櫃股票
min_listing_days = 30                # 上市未滿 N 天的新股暫不納入

# -----------------------------------------------------------------------------
# 靜態股票清單（僅 mode = "file" 或 "both" 時使用）
# 可用於開發測試：只跑少數幾檔，避免全市場 1,800 檔耗時太久
# -----------------------------------------------------------------------------
[stocks]
ids = [
    # "2330",  # 台積電
    # "2317",  # 鴻海
    # "2454",  # 聯發科
    # "2412",  # 中華電
    # "2442",  # 新美齊（測試現增事件）
]

# -----------------------------------------------------------------------------
# 開發模式
# 設定 enabled = true 後，stock_resolver 強制使用 [stocks].ids
# 避免開發時跑全市場，節省 API 呼叫次數
# -----------------------------------------------------------------------------
[dev]
enabled = false    # 正式環境請保持 false
